# Battery-first Sofle config, v1.

# OLEDs/screens removed or unused.
CONFIG_ZMK_DISPLAY=n

# The stock Sofle shield defines EC11 encoder sensor nodes. Leave the driver
# enabled so those nodes can link, but omit sensor bindings in the keymap.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# RGB remains disabled for battery life.
CONFIG_ZMK_RGB_UNDERGLOW=n

# Enter idle after 30 seconds, then deep sleep after 15 minutes.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Optional Windows workaround if battery notifications behave oddly.
# CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
