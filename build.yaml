# GitHub Actions build matrix for Sofle halves as dongle peripherals.
# ZMK/Zephyr main currently exposes nice!nano as "nice_nano".
# The MDBT50Q-CX dongle uses the Raytac nRF52840 board target.
---
include:
  - board: nice_nano
    shield: sofle_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: sofle_left_peripheral

  - board: nice_nano
    shield: sofle_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: sofle_right_peripheral

  - board: raytac_mdbt50q_db_40
    shield: sofle_dongle
    artifact-name: sofle_dongle_central

  - board: nice_nano
    shield: settings_reset
    artifact-name: settings_reset_nice_nano

  - board: raytac_mdbt50q_db_40
    shield: settings_reset
    artifact-name: settings_reset_dongle
